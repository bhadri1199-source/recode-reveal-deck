<!doctype html>
<html>

<head>

<meta charset="utf-8">

<title>RECODE Reveal Deck</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Reveal Core CSS -->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">

<!-- Reveal Theme -->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">

<!-- Custom Styles -->

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="reveal">

<div class="slides">

<!-- Slide 1 -->

<section>

<h1>RECODE AI Solutions</h1>

<p>Interactive Presentation Framework</p>

</section>

<!-- Slide 2 -->

<section>

<h2>Welcome</h2>

<p>This deck is built using Reveal.js</p>

</section>

</div>

</div>

<!-- Reveal JS Engine -->

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>

<script>

Reveal.initialize({

hash: true,
slideNumber: true,
controls: true,
progress: true,
transition: "slide"

});

</script>

</body>
</html>

<div class="slides">
